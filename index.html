<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/YTMQ/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>YTMQ</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;600;700;800&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <script>
      // Undo GitHub Pages 404.html redirect (?/room/… → /room/…) before React Router runs.
      ;(function (l) {
        if (l.search[1] === '/') {
          var decoded = l.search
            .slice(1)
            .split('&')
            .map(function (s) {
              return s.replace(/~and~/g, '&')
            })
            .join('?')
            .split('?')
          window.history.replaceState(
            null,
            null,
            l.pathname.slice(0, -1) +
              (decoded[0] || '') +
              (decoded[1] ? '?' + decoded[1] : '') +
              l.hash,
          )
        }
      })(window.location)
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
