name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - run: npm ci

      - name: Require Supabase secrets
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: |
          if [ -z "$VITE_SUPABASE_URL" ] || [ -z "$VITE_SUPABASE_ANON_KEY" ]; then
            echo "::error::Add VITE_SUPABASE_URL and VITE_SUPABASE_ANON_KEY repository secrets."
            exit 1
          fi

      - run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - name: Verify build output
        run: |
          test -f dist/index.html
          test -f dist/404.html
          test -f dist/ytmusic-bridge.js
          grep -q '/YTMQ/assets/' dist/index.html
          grep -q 'segmentCount' dist/404.html
          ! grep -q '/src/main.tsx' dist/index.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Wait for in-progress Pages deployment
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo
            const maxAttempts = 36
            for (let attempt = 1; attempt <= maxAttempts; attempt++) {
              const { data } = await github.rest.repos.listPagesDeployments({
                owner,
                repo,
                per_page: 10,
              })
              const blocking = data.find(
                (d) => d.status === 'queued' || d.status === 'in_progress',
              )
              if (!blocking) {
                core.info('No blocking Pages deployment.')
                return
              }
              core.info(
                `Attempt ${attempt}/${maxAttempts}: deployment ${blocking.id} is ${blocking.status} — waiting 10s`,
              )
              await new Promise((resolve) => setTimeout(resolve, 10_000))
            }
            core.setFailed(
              'Timed out waiting for an in-progress GitHub Pages deployment. Cancel it under Environments → github-pages, or wait and re-run.',
            )

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
