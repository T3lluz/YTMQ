<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>YTMQ</title>
    <script>
      // GitHub Pages SPA fallback: rewrite /YTMQ/room/… → /YTMQ/?/room/… so index.html loads.
      // https://github.com/rafgraph/spa-github-pages
      ;(function () {
        var segmentCount = 1
        var l = window.location
        l.replace(
          l.protocol +
            '//' +
            l.hostname +
            (l.port ? ':' + l.port : '') +
            l.pathname
              .split('/')
              .slice(0, 1 + segmentCount)
              .join('/') +
            '/?/' +
            l.pathname
              .slice(1)
              .split('/')
              .slice(segmentCount)
              .join('/')
              .replace(/&/g, '~and~') +
            (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
            l.hash,
        )
      })()
    </script>
  </head>
  <body></body>
</html>
