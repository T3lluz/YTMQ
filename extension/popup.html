<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>YTMQ</title>
    <style>
      :root {
        color-scheme: dark;
        /* Chrome sizes the popup from document width — use a fixed base, not vw. */
        --popup-w: 300px;
        --space: 12px;
        --radius: 10px;
        --text: 13px;
        --text-sm: 12px;
        --btn-h: 36px;
      }
      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }
      html {
        width: var(--popup-w);
        min-width: var(--popup-w);
        max-width: var(--popup-w);
      }
      body {
        margin: 0;
        width: var(--popup-w);
        min-width: var(--popup-w);
        max-width: var(--popup-w);
        background: #09090b;
        color: #fafafa;
        font: var(--text) / 1.45 system-ui, sans-serif;
        -webkit-text-size-adjust: 100%;
        text-size-adjust: 100%;
      }
      header {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: var(--space) var(--space) 10px;
        border-bottom: 1px solid #27272a;
      }
      header img {
        width: 22px;
        height: 22px;
        flex: none;
        border-radius: 6px;
      }
      header strong {
        font-size: 14px;
        font-weight: 600;
      }
      main {
        padding: var(--space);
      }
      .status {
        display: flex;
        align-items: flex-start;
        gap: 8px;
        border-radius: var(--radius);
        border: 1px solid #27272a;
        background: #18181b;
        padding: 10px var(--space);
        min-width: 0;
      }
      .dot {
        width: 8px;
        height: 8px;
        flex: none;
        margin-top: 4px;
        border-radius: 50%;
        background: #52525b;
      }
      .dot.on {
        background: #34d399;
      }
      .status-copy {
        min-width: 0;
        flex: 1;
      }
      .status p {
        margin: 0;
      }
      #status-text {
        font-size: var(--text);
        line-height: 1.35;
      }
      .status .room {
        margin-top: 3px;
        color: #a1a1aa;
        font-size: var(--text-sm);
        line-height: 1.3;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .hint {
        margin: 10px 0 0;
        color: #a1a1aa;
        font-size: var(--text-sm);
        line-height: 1.4;
      }
      .actions {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
        margin-top: var(--space);
      }
      button {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 100%;
        min-height: var(--btn-h);
        border: 0;
        border-radius: 9px;
        padding: 7px 8px;
        font: 500 var(--text-sm) / 1.25 system-ui, sans-serif;
        text-align: center;
        cursor: pointer;
        white-space: normal;
        word-break: break-word;
      }
      .primary {
        background: #7c3aed;
        color: #fff;
      }
      .primary:hover {
        background: #8b5cf6;
      }
      .secondary {
        background: #27272a;
        color: #e4e4e7;
      }
      .secondary:hover {
        background: #3f3f46;
      }
      .outline {
        background: transparent;
        border: 1px solid #3f3f46;
        color: #e4e4e7;
      }
      .outline:hover {
        background: #18181b;
        border-color: #52525b;
      }
      #disconnect {
        grid-column: 1 / -1;
      }
      .hidden {
        display: none !important;
      }
    </style>
  </head>
  <body>
    <header>
      <img src="icons/icon32.png" alt="" />
      <strong>YTMQ</strong>
    </header>
    <main>
      <div class="status">
        <span id="dot" class="dot"></span>
        <div class="status-copy">
          <p id="status-text">Not linked to a room</p>
          <p id="room" class="room hidden"></p>
        </div>
      </div>
      <p class="hint" id="hint">
        Open your YTMQ lobby as host — the extension picks up the room and
        links every music.youtube.com tab automatically.
      </p>
      <div class="actions">
        <button id="open-ytmq" class="outline" type="button">Open YTMQ</button>
        <button id="open-ytm" class="primary" type="button">Open YT Music</button>
        <button id="disconnect" class="secondary hidden" type="button">
          Disconnect
        </button>
      </div>
    </main>
    <script src="popup.js"></script>
  </body>
</html>
