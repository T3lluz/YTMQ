<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>YTMQ</title>
    <style>
      :root {
        color-scheme: dark;
      }
      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        width: min(100vw, 320px);
        max-width: 320px;
        overflow-x: hidden;
        background: #09090b;
        color: #fafafa;
        font: 13px/1.5 system-ui, sans-serif;
        -webkit-text-size-adjust: 100%;
        text-size-adjust: 100%;
      }
      header {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 12px 14px 10px;
        border-bottom: 1px solid #27272a;
      }
      header img {
        width: 22px;
        height: 22px;
        flex: none;
        border-radius: 6px;
      }
      header strong {
        font-size: 14px;
        min-width: 0;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      main {
        padding: 12px 14px 14px;
      }
      .status {
        display: flex;
        align-items: flex-start;
        gap: 8px;
        border-radius: 10px;
        border: 1px solid #27272a;
        background: #18181b;
        padding: 10px 12px;
        min-width: 0;
      }
      .dot {
        width: 8px;
        height: 8px;
        flex: none;
        margin-top: 5px;
        border-radius: 50%;
        background: #52525b;
      }
      .dot.on {
        background: #34d399;
      }
      .status-copy {
        min-width: 0;
        flex: 1;
      }
      .status p {
        margin: 0;
        overflow-wrap: anywhere;
        word-break: break-word;
      }
      #status-text {
        font-size: 13px;
        line-height: 1.35;
      }
      .status .room {
        margin-top: 2px;
        color: #a1a1aa;
        font-size: 12px;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .hint {
        margin: 10px 0 0;
        color: #a1a1aa;
        font-size: 12px;
        line-height: 1.45;
        overflow-wrap: anywhere;
        word-break: break-word;
      }
      .actions {
        display: flex;
        flex-direction: column;
        gap: 8px;
        margin-top: 12px;
      }
      .actions-row {
        display: flex;
        gap: 8px;
        min-width: 0;
      }
      button {
        flex: 1;
        min-width: 0;
        border: 0;
        border-radius: 9px;
        padding: 9px 10px;
        font: 500 12px/1.3 system-ui, sans-serif;
        text-align: center;
        cursor: pointer;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .primary {
        background: #7c3aed;
        color: #fff;
      }
      .primary:hover {
        background: #8b5cf6;
      }
      .secondary {
        background: #27272a;
        color: #e4e4e7;
      }
      .secondary:hover {
        background: #3f3f46;
      }
      .outline {
        background: transparent;
        border: 1px solid #3f3f46;
        color: #e4e4e7;
      }
      .outline:hover {
        background: #18181b;
        border-color: #52525b;
      }
      .hidden {
        display: none !important;
      }
    </style>
  </head>
  <body>
    <header>
      <img src="icons/icon32.png" alt="" />
      <strong>YTMQ</strong>
    </header>
    <main>
      <div class="status">
        <span id="dot" class="dot"></span>
        <div class="status-copy">
          <p id="status-text">Not linked to a room</p>
          <p id="room" class="room hidden"></p>
        </div>
      </div>
      <p class="hint" id="hint">
        Open your YTMQ lobby as host and click “Connect YouTube Music”. The
        extension links every music.youtube.com tab automatically.
      </p>
      <div class="actions">
        <div class="actions-row">
          <button id="open-ytmq" class="outline" type="button">
            Open YTMQ
          </button>
          <button id="open-ytm" class="primary" type="button">
            Open YT Music
          </button>
        </div>
        <button id="disconnect" class="secondary hidden" type="button">
          Disconnect
        </button>
      </div>
    </main>
    <script src="popup.js"></script>
  </body>
</html>
