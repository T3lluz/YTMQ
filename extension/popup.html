<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>YTMQ</title>
    <style>
      :root {
        color-scheme: dark;
      }
      body {
        margin: 0;
        width: 300px;
        background: #09090b;
        color: #fafafa;
        font: 13px/1.5 system-ui, sans-serif;
      }
      header {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 12px 14px 10px;
        border-bottom: 1px solid #27272a;
      }
      header img {
        width: 22px;
        height: 22px;
        border-radius: 6px;
      }
      header strong {
        font-size: 14px;
      }
      main {
        padding: 12px 14px 14px;
      }
      .status {
        display: flex;
        align-items: center;
        gap: 8px;
        border-radius: 10px;
        border: 1px solid #27272a;
        background: #18181b;
        padding: 10px 12px;
      }
      .dot {
        width: 8px;
        height: 8px;
        flex: none;
        border-radius: 50%;
        background: #52525b;
      }
      .dot.on {
        background: #34d399;
      }
      .status p {
        margin: 0;
      }
      .status .room {
        color: #a1a1aa;
        font-size: 12px;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .hint {
        margin: 10px 0 0;
        color: #a1a1aa;
        font-size: 12px;
      }
      .actions {
        display: flex;
        gap: 8px;
        margin-top: 12px;
      }
      button {
        flex: 1;
        border: 0;
        border-radius: 9px;
        padding: 8px 10px;
        font: 500 12px/1.3 system-ui, sans-serif;
        text-align: center;
        cursor: pointer;
      }
      .primary {
        background: #7c3aed;
        color: #fff;
      }
      .primary:hover {
        background: #8b5cf6;
      }
      .secondary {
        background: #27272a;
        color: #e4e4e7;
      }
      .secondary:hover {
        background: #3f3f46;
      }
      .hidden {
        display: none;
      }
    </style>
  </head>
  <body>
    <header>
      <img src="icons/icon32.png" alt="" />
      <strong>YTMQ</strong>
    </header>
    <main>
      <div class="status">
        <span id="dot" class="dot"></span>
        <div>
          <p id="status-text">Not linked to a room</p>
          <p id="room" class="room hidden"></p>
        </div>
      </div>
      <p class="hint" id="hint">
        Open your YTMQ lobby as host and click “Connect YouTube Music”. The
        extension links every music.youtube.com tab automatically.
      </p>
      <div class="actions">
        <button id="open-ytm" class="primary" type="button">
          Open YT Music
        </button>
        <button id="disconnect" class="secondary hidden" type="button">
          Disconnect
        </button>
      </div>
    </main>
    <script src="popup.js"></script>
  </body>
</html>
